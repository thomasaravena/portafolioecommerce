<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Empeda2 Drinks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --dark-bg: #050505;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            padding: 15px 0;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .logo-empeda2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .logo-drinks { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        .wrapper { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .glass-card {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--neon-purple);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 450px;
            padding: 35px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        h4 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-purple); }

        .form-label { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--neon-blue); margin-top: 15px; }

        .contact-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid #444 !important;
            color: white !important;
            border-radius: 10px;
        }

        .btn-neon-green {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            padding: 12px;
            margin-top: 25px;
        }

        .btn-neon-green:hover { background: var(--neon-green); color: black; box-shadow: 0 0 25px var(--neon-green); transform: scale(1.02); }

        .login-link { color: var(--neon-blue); text-decoration: none; font-size: 0.85rem; font-family: 'Orbitron', sans-serif; }
        
        .alert-neon {
            background: rgba(255, 49, 49, 0.1);
            border: 1px solid #ff3131;
            color: #ff3131;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar glass-nav">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold" th:href="@{/}" style="font-family: 'Orbitron';">
                <span class="logo-empeda2">EMPEDA2</span><span class="logo-drinks"> DRINKS</span>
            </a>
        </div>
    </nav>

    <div class="wrapper">
        <div class="glass-card text-center">
            <h4>Crea tu cuenta</h4>
            <p class="text-light small">Únete a la élite de Empeda2 Drinks</p>

            <div th:if="${error}" class="alert alert-neon mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/registro}" th:object="${usuario}" method="post" class="text-start">
                <label class="form-label">CORREO ELECTRÓNICO</label>
                <input type="email" th:field="*{email}" class="form-control contact-input" placeholder="tu@email.com" required maxlength="50">
                
                <label class="form-label">CONTRASEÑA</label>
                <input type="password" th:field="*{password}" class="form-control contact-input" placeholder="Mínimo 4 caracteres" required minlength="4">
                
                <label class="form-label">CONFIRMAR CONTRASEÑA</label>
                <input type="password" th:field="*{confirmacionPassword}" class="form-control contact-input" placeholder="Repite tu contraseña" required>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-neon-green">REGISTRARME</button>
                    <hr class="border-secondary">
                    <div class="text-center">
                        <a th:href="@{/login}" class="login-link">¿YA TIENES CUENTA? INICIA SESIÓN</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

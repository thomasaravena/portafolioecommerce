<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Carta | Empeda2 Drinks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --dark-bg: #050505;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            padding: 15px 0;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            z-index: 1000;
        }

        .logo-empeda2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .logo-drinks { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        /* --- Cards --- */
        .card-mojito {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
            height: 100%;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .card-mojito:hover {
            border-color: var(--neon-blue);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
        }

        .card-mojito img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: brightness(0.9);
        }

        .card-info h3 { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.3rem; 
            color: #ffffff;
        }

        .price {
            display: block;
            font-size: 1.6rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin: 15px 0;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-neon-green {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-neon-green:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 25px var(--neon-green);
        }

        .neon-title {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: white;
            text-shadow: 0 0 20px var(--neon-purple);
            letter-spacing: 5px;
        }

        .subtitle-clear {
            color: #00f3ff;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .neon-footer {
            background: #000;
            border-top: 2px solid var(--neon-purple);
            padding: 60px 0 30px;
            margin-top: 100px;
        }

        .footer-brand { font-family: 'Orbitron'; letter-spacing: 2px; }
        
        .footer-link {
            color: #fff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .link-ig { color: var(--neon-purple); }
        .link-ws { color: var(--neon-green); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}" style="font-family: 'Orbitron';">
                <span class="logo-empeda2">EMPEDA2</span>
                <span class="logo-drinks">DRINKS</span>
            </a>
            
            <div class="ms-auto d-flex align-items-center">
                <a th:href="@{/}" class="btn btn-outline-info btn-sm me-4" style="font-family: 'Orbitron';">VOLVER</a>
                <a th:href="@{/carrito/ver}" class="text-white position-relative">
                    <i class="bi bi-cart-fill fs-4"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                          th:text="${itemsCount}">0</span>
                </a>
            </div>
        </div>
    </nav>

    <header class="py-5 mt-5">
        <div class="container text-center py-5">
            <h1 class="display-3 fw-bold neon-title">NUESTRA CARTA</h1>
            <p class="lead subtitle-clear mt-2">SABORES TROPICALES QUE BRILLAN EN LA OSCURIDAD</p>
        </div>
    </header>

    <section class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4 col-sm-6" th:each="producto : ${listaProductos}">
                <div class="card-mojito">
                    <img th:src="${producto.imagenUrl}" th:alt="${producto.nombre}">
                    <div class="p-4 text-center card-info">
                        <h3 th:text="${producto.nombre}"></h3>
                        <p class="text-white-50 small" th:text="${producto.descripcion}"></p>
                        <span class="price" th:text="'$' + ${#numbers.formatInteger(producto.precio, 0, 'POINT')}"></span>
                        
                        <a th:href="@{/carrito/agregar/{id}(id=${producto.id})}" class="btn btn-neon-green w-100 py-2">
                            <i class="bi bi-plus-lg me-2"></i> AGREGAR AL PEDIDO
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="neon-footer">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-4 mb-4 mb-md-0">
                    <h3 class="footer-brand">
                        <span class="logo-empeda2">EMPEDA2</span><span class="logo-drinks">DRINKS</span>
                    </h3>
                    <p class="text-white-50 small">Elevando tus noches con el mejor sabor tropical.</p>
                </div>
                <div class="col-md-4 text-center mb-4 mb-md-0">
                    <a href="https://www.instagram.com/empeda2.drinks" target="_blank" class="footer-link link-ig">
                        <i class="fab fa-instagram me-2"></i> @empeda2.drinks
                    </a>
                    <a href="https://wa.me/56962819865" target="_blank" class="footer-link link-ws">
                        <i class="fab fa-whatsapp me-2"></i> +56 9 6281 9865
                    </a>
                </div>
                <div class="col-md-4 text-md-end text-center">
                    <p class="text-secondary small">© 2026 Thomas Aravena.<br>Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

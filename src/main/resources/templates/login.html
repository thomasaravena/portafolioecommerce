<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Empeda2 Drinks</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --dark-bg: #050505;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
        }

        body {
            background-color: var(--dark-bg);
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-blue);
            padding: 15px 0;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .logo-empeda2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .logo-drinks { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }

        .login-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--neon-purple);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        h3 { 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 2px; 
            color: white;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        /* ESTILO PARA EL MENSAJE DE ÉXITO */
        .alert-neon-success {
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .form-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--neon-blue);
        }

        .contact-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid #444 !important;
            color: white !important;
            border-radius: 10px;
            padding: 12px;
        }

        .contact-input::placeholder { color: #f0f0f0 !important; opacity: 0.8; }

        .btn-neon {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
            text-transform: uppercase;
            font-weight: bold;
            padding: 12px;
        }

        .btn-neon:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 25px var(--neon-green);
        }

        .reg-link { color: var(--neon-blue); text-decoration: none; font-size: 0.85rem; }
        .reg-link:hover { color: white; text-shadow: 0 0 5px var(--neon-blue); }
    </style>
</head>
<body>
    <nav class="navbar glass-nav">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold" th:href="@{/}" style="font-family: 'Orbitron';">
                <span class="logo-empeda2">EMPEDA2</span><span class="logo-drinks"> DRINKS</span>
            </a>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="glass-card">
            <div class="text-center mb-4">
                <h3>LOGIN</h3>
                <p class="text-light small">Accede a la experiencia Empeda2</p>
            </div>

            <div th:if="${mensajeExito}" class="alert alert-neon-success text-center mb-4 p-2">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${mensajeExito}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">EMAIL / USUARIO</label>
                    <input type="email" name="username" class="form-control contact-input" placeholder="usuario@correo.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">CONTRASEÑA</label>
                    <input type="password" name="password" class="form-control contact-input" placeholder="••••••••" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-neon">INICIAR SESIÓN</button>
                </div>
            </form>
            <hr class="border-secondary">
            <div class="text-center">
                <p class="small text-light mb-1">¿Aún no tienes cuenta?</p>
                <a th:href="@{/registro}" class="reg-link">REGÍSTRATE AQUÍ</a>
            </div>
        </div>
    </div>
</body>
</html>
